<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>职教数智早报详情</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background-color: #f3f4f6;
    }
    .tag {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
    }
    .tag-宏观经济 { background: #fef3c7; color: #92400e; }
    .tag-科技 { background: #dbeafe; color: #1e40af; }
    .tag-教育 { background: #dcfce7; color: #166534; }
    .tag-行业 { background: #f3e8ff; color: #6b21a8; }
    .tag-农业 { background: #ecfccb; color: #3f6212; }
    .tag-交通 { background: #ccfbf1; color: #115e59; }
    .tag-体育 { background: #fee2e2; color: #991b1b; }
    .tag-default { background: #e5e7eb; color: #374151; }
    .news-item {
      transition: all 0.15s ease;
    }
    .news-item:hover {
      background: #fafafa;
    }
  </style>
</head>
<body class="min-h-screen">
  <!-- Header -->
  <header class="bg-white shadow-sm sticky top-0 z-10">
    <div class="max-w-3xl mx-auto px-4 py-4 flex items-center gap-3">
      <a href="index.html" class="flex items-center text-gray-500 hover:text-gray-900 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
        </svg>
        <span class="text-sm font-medium">返回</span>
      </a>
      <div class="h-4 w-px bg-gray-300"></div>
      <div>
        <h1 class="text-lg font-bold text-gray-900" id="page-title">职教数智早报</h1>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="max-w-3xl mx-auto px-4 py-6">
    <div id="detail-content">
      <!-- 内容由 JS 插入 -->
    </div>
  </main>

  <script src="data.js"></script>
  <script>
    function loadDetail() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');

      if (!id) {
        document.getElementById('detail-content').innerHTML = `
          <div class="text-center py-20 text-gray-400">
            <p class="text-lg">缺少日期参数</p>
            <a href="index.html" class="text-blue-600 text-sm mt-4 inline-block">返回列表</a>
          </div>
        `;
        return;
      }

      if (typeof NEWS_DATA === 'undefined') {
        document.getElementById('detail-content').innerHTML = `
          <div class="text-center py-20 text-gray-400">
            <p class="text-lg">数据加载失败</p>
            <p class="text-sm mt-2">请确认 data.js 文件存在且未被修改</p>
          </div>
        `;
        return;
      }

      const item = NEWS_DATA.find(d => d.id === id);

      if (!item) {
        document.getElementById('detail-content').innerHTML = `
          <div class="text-center py-20 text-gray-400">
            <p class="text-lg">未找到 ${id} 的早报数据</p>
            <a href="index.html" class="text-blue-600 text-sm mt-4 inline-block">返回列表</a>
          </div>
        `;
        return;
      }

      render(item);
    }

    function render(item) {
      document.getElementById('page-title').textContent = `${item.date} ${item.weekday}`;

      const container = document.getElementById('detail-content');
      container.innerHTML = `
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
          <div class="px-5 py-4 border-b border-gray-100 bg-gray-50">
            <div class="flex items-center justify-between">
              <div class="flex items-center gap-2">
                <span class="text-xl font-bold text-gray-900">${item.date}</span>
                <span class="text-sm text-gray-500">${item.weekday}</span>
              </div>
              <span class="text-sm text-gray-400">共 ${item.items.length} 条</span>
            </div>
          </div>

          <div class="divide-y divide-gray-100">
            ${item.items.map((news, idx) => `
              <div class="news-item px-5 py-5">
                <div class="flex items-start gap-3">
                  <div class="flex-shrink-0 mt-0.5">
                    <span class="inline-flex items-center justify-center w-6 h-6 rounded-full bg-gray-100 text-xs font-bold text-gray-600">${idx + 1}</span>
                  </div>
                  <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-2 mb-2">
                      <span class="tag tag-${news.tag} tag-default">${news.tag}</span>
                    </div>
                    <h3 class="text-base font-semibold text-gray-900 leading-snug mb-2">${news.title}</h3>
                    <p class="text-sm text-gray-600 leading-relaxed">${news.content}</p>
                  </div>
                </div>
              </div>
            `).join('')}
          </div>
        </div>

      ${item.trends ? `
        <div class="mt-4 bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
          <div class="px-5 py-3 border-b border-gray-100 bg-gray-50">
            <span class="text-sm font-semibold text-gray-900">📌 重点趋势</span>
          </div>
          <div class="px-5 py-4">
            <p class="text-sm text-gray-600 leading-relaxed whitespace-pre-line">${item.trends}</p>
          </div>
        </div>
      ` : ''}

      ${item.sources ? `
        <div class="mt-4 bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
          <div class="px-5 py-3 border-b border-gray-100 bg-gray-50">
            <span class="text-sm font-semibold text-gray-900">🔗 信息来源</span>
          </div>
          <div class="px-5 py-4">
            <p class="text-sm text-gray-500 leading-relaxed">${item.sources}</p>
          </div>
        </div>
      ` : ''}

        <div class="mt-6 text-center">
          <a href="index.html" class="inline-flex items-center gap-1.5 text-sm text-gray-500 hover:text-gray-900 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
            返回列表
          </a>
        </div>
      `;
    }

    loadDetail();
  </script>
</body>
</html>
