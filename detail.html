<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>职教数智早报详情</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background-color: #f3f4f6;
    }
    .tag {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
    }
    .tag-宏观经济 { background: #fef3c7; color: #92400e; }
    .tag-科技 { background: #dbeafe; color: #1e40af; }
    .tag-教育 { background: #dcfce7; color: #166534; }
    .tag-行业 { background: #f3e8ff; color: #6b21a8; }
    .tag-农业 { background: #ecfccb; color: #3f6212; }
    .tag-交通 { background: #ccfbf1; color: #115e59; }
    .tag-体育 { background: #fee2e2; color: #991b1b; }
    .tag-default { background: #e5e7eb; color: #374151; }
    .news-item {
      transition: all 0.15s ease;
    }
    .news-item:hover {
      background: #fafafa;
    }
  </style>
  <script>
    var _hmt = _hmt || [];
    (function() {
      var hm = document.createElement("script");
      hm.src = "https://hm.baidu.com/hm.js?62726a1c79a7cee6b64dfa00e865d3c8";
      var s = document.getElementsByTagName("script")[0]; 
      s.parentNode.insertBefore(hm, s);
    })();
  </script>
</head>
<body class="min-h-screen">
  <!-- Header -->
  <header class="bg-white shadow-sm sticky top-0 z-10">
    <div class="max-w-3xl mx-auto px-4 py-4 flex items-center gap-3">
      <a href="index.html" class="flex items-center text-gray-500 hover:text-gray-900 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
        </svg>
        <span class="text-sm font-medium">返回</span>
      </a>
      <div class="h-4 w-px bg-gray-300"></div>
      <div>
        <h1 class="text-lg font-bold text-gray-900" id="page-title">职教数智早报</h1>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="max-w-3xl mx-auto px-4 py-6">
    <div id="detail-content">
      <!-- 内容由 JS 插入 -->
    </div>
  </main>

  <script src="data.js"></script>
  <script>
    function loadDetail() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');

      if (!id) {
        document.getElementById('detail-content').innerHTML = '\n          <div class="text-center py-20 text-gray-400">\n            <p class="text-lg">缺少日期参数</p>\n            <a href="index.html" class="text-blue-600 text-sm mt-4 inline-block">返回列表</a>\n          </div>\n        ';
        return;
      }

      if (typeof NEWS_DATA === 'undefined') {
        document.getElementById('detail-content').innerHTML = '\n          <div class="text-center py-20 text-gray-400">\n            <p class="text-lg">数据加载失败</p>\n            <p class="text-sm mt-2">请确认 data.js 文件存在且未被修改</p>\n          </div>\n        ';
        return;
      }

      const item = NEWS_DATA.find(function(d) { return d.id === id; });

      if (!item) {
        document.getElementById('detail-content').innerHTML = '\n          <div class="text-center py-20 text-gray-400">\n            <p class="text-lg">未找到 ' + id + ' 的早报数据</p>\n            <a href="index.html" class="text-blue-600 text-sm mt-4 inline-block">返回列表</a>\n          </div>\n        ';
        return;
      }

      render(item);

      // 百度统计：记录单条早报浏览
      if (typeof _hmt !== 'undefined') {
        _hmt.push(['_trackEvent', '早报', '浏览', item.id]);
      }
    }

    function render(item) {
      document.getElementById('page-title').textContent = item.date + ' ' + item.weekday;

      var newsList = '';
      for (var i = 0; i < item.items.length; i++) {
        var news = item.items[i];
        newsList += '\n          <div class="news-item px-5 py-5">\n            <div class="flex items-start gap-3">\n              <div class="flex-shrink-0 mt-0.5">\n                <span class="inline-flex items-center justify-center w-6 h-6 rounded-full bg-gray-100 text-xs font-bold text-gray-600">' + (i + 1) + '</span>\n              </div>\n              <div class="flex-1 min-w-0">\n                <div class="flex items-center gap-2 mb-2">\n                  <span class="tag tag-' + news.tag + ' tag-default">' + news.tag + '</span>\n                </div>\n                <h3 class="text-base font-semibold text-gray-900 leading-snug mb-2">' + news.title + '</h3>\n                <p class="text-sm text-gray-600 leading-relaxed">' + news.content + '</p>\n              </div>\n            </div>\n          </div>\n        ';
      }

      var trendsSection = '';
      if (item.trends) {
        trendsSection = '\n        <div class="mt-4 bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">\n          <div class="px-5 py-3 border-b border-gray-100 bg-gray-50">\n            <span class="text-sm font-semibold text-gray-900">📌 重点趋势</span>\n          </div>\n          <div class="px-5 py-4">\n            <p class="text-sm text-gray-600 leading-relaxed">' + item.trends + '</p>\n          </div>\n        </div>\n        ';
      }

      var sourcesSection = '';
      if (item.sources) {
        sourcesSection = '\n        <div class="mt-4 bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">\n          <div class="px-5 py-3 border-b border-gray-100 bg-gray-50">\n            <span class="text-sm font-semibold text-gray-900">🔗 信息来源</span>\n          </div>\n          <div class="px-5 py-4">\n            <p class="text-sm text-gray-500 leading-relaxed">' + item.sources + '</p>\n          </div>\n        </div>\n        ';
      }

      var html = '\n        <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">\n          <div class="px-5 py-4 border-b border-gray-100 bg-gray-50">\n            <div class="flex items-center justify-between">\n              <div class="flex items-center gap-2">\n                <span class="text-xl font-bold text-gray-900">' + item.date + '</span>\n                <span class="text-sm text-gray-500">' + item.weekday + '</span>\n              </div>\n              <span class="text-sm text-gray-400">共 ' + item.items.length + ' 条</span>\n            </div>\n          </div>\n\n          <div class="divide-y divide-gray-100">\n            ' + newsList + '\n          </div>\n        </div>\n\n        ' + trendsSection + '\n\n        ' + sourcesSection + '\n\n        <div class="mt-6 text-center">\n          <a href="index.html" class="inline-flex items-center gap-1.5 text-sm text-gray-500 hover:text-gray-900 transition-colors">\n            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">\n              <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />\n            </svg>\n            返回列表\n          </a>\n        </div>\n      ';

      document.getElementById('detail-content').innerHTML = html;
    }

    loadDetail();
  </script>

  <!-- 不蒜子统计 -->
  <script async src="https://busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>

  <!-- 统计入口 -->
  <footer class="bg-white border-t border-gray-200 mt-8">
    <div class="max-w-3xl mx-auto px-4 py-4">
      <div class="flex items-center justify-center space-x-4 text-sm text-gray-400">
        <span class="flex items-center space-x-1">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
          <span>总访问 <span id="busuanzi_value_site_pv">0</span></span>
        </span>
        <span>·</span>
        <span class="flex items-center space-x-1">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
          <span>访客 <span id="busuanzi_value_site_uv">0</span></span>
        </span>
        <span>·</span>
        <a href="https://tongji.baidu.com" target="_blank" class="text-gray-400 hover:text-gray-600 transition-colors">统计详情 →</a>
      </div>
    </div>
  </footer>

</body>
</html>
